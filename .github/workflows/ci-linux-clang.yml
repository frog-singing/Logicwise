name: CI - Linux Clang
  
on:
  push:
    branches: [ "main" ]
    paths: [ 'library/**', 'test/**', 'CMakeLists.txt', '.github/workflows/**' ]
  pull_request:
    branches: [ "main" ]
    paths: [ 'library/**', 'test/**', 'CMakeLists.txt' ]
  workflow_dispatch:

jobs:
  specialize:
    uses: ./.github/workflows/_compiler_template.yml
    with:
      os: ubuntu-latest
      cxx_compiler: clang++-19
      display_name: "Linux / Clang 19"
