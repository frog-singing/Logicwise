name: CI - Windows MSVC
  
on:
  push:
    branches: [ "main" ]
    paths: [ 'library/**', 'test/**', 'CMakeLists.txt', '.github/workflows/**' ]
  pull_request:
    branches: [ "main" ]
    paths: [ 'library/**', 'test/**', 'CMakeLists.txt' ]
  workflow_dispatch:

jobs:
  specialize:
    uses: ./.github/workflows/_compiler_template.yml
    with:
      os: windows-latest
      cxx_compiler: cl
      display_name: "Windows / MSVC"
  